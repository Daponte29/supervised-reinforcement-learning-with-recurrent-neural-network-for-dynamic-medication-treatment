# WandB sweep config — run with: wandb sweep configs/sweep.yaml
# For Optuna, translate these ranges into an objective function instead.

program: src/train.py
method: bayes        # grid | random | bayes

metric:
  name: val/loss
  goal: minimize

parameters:
  train.lr:
    distribution: log_uniform_values
    min: 1.0e-5
    max: 1.0e-2

  train.batch_size:
    values: [16, 32, 64, 128]

  train.weight_decay:
    distribution: log_uniform_values
    min: 1.0e-6
    max: 1.0e-2

  # TODO: add model-specific hyperparams to sweep
